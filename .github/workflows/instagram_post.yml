name: Caffiend Instagram Auto-Post

on:
  schedule:
    - cron: '15 15 * * *'   # 15:15 UTC — Carousel 1 Relatable
    - cron: '45 16 * * *'   # 16:45 UTC — Carousel 2 Education
    - cron: '15 18 * * *'   # 18:15 UTC — Carousel 3 Humor
    - cron: '45 19 * * *'   # 19:45 UTC — Carousel 4 Tips
    - cron: '15 21 * * *'   # 21:15 UTC — Carousel 5 Health
    - cron: '0 7 * * *'     # 07:00 UTC — Carousel 6 Social Proof
    - cron: '30 8 * * *'    # 08:30 UTC — Carousel 7 Challenge
    - cron: '0 10 * * *'    # 10:00 UTC — Carousel 8 Mindset
    - cron: '0 12 * * *'    # 12:00 UTC — Carousel 9 FOMO
  workflow_dispatch:
    inputs:
      carousel_index:
        description: 'Carousel index to post (0-8). Leave empty to auto-detect by time.'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install composio composio-claude-agent-sdk claude-agent-sdk

      - name: Post carousel
        env:
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_USER_ID: ${{ secrets.COMPOSIO_USER_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAROUSEL_INDEX: ${{ github.event.inputs.carousel_index }}
        run: python scripts/post_carousel.py

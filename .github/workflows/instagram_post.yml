name: Caffiend Instagram Auto-Post

on:
  # Schedule paused — re-enable when content is ready
  workflow_dispatch:
    inputs:
      carousel_index:
        description: 'Carousel index to post (0-8)'
        required: false
        default: ''

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install instagrapi "moviepy==1.0.3" pillow

      - name: Convert carousels to Reels
        run: python scripts/convert_to_reels.py

      - name: Post Reel to Instagram
        env:
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION }}
          CAROUSEL_INDEX: ${{ github.event.inputs.carousel_index }}
        run: python -u scripts/post_reel.py

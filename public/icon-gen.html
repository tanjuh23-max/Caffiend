<!doctype html>
<html>
<head><meta charset="UTF-8"/></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas) {
  const S = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  const bg = ctx.createRadialGradient(S*0.5, S*0.38, 0, S*0.5, S*0.5, S*0.65);
  bg.addColorStop(0, '#1a1108');
  bg.addColorStop(1, '#0c0c0e');
  ctx.fillStyle = bg;
  // Rounded rect background
  const r = S * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0); ctx.lineTo(S - r, 0);
  ctx.quadraticCurveTo(S, 0, S, r);
  ctx.lineTo(S, S - r);
  ctx.quadraticCurveTo(S, S, S - r, S);
  ctx.lineTo(r, S);
  ctx.quadraticCurveTo(0, S, 0, S - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Subtle amber border
  ctx.strokeStyle = 'rgba(245,158,11,0.2)';
  ctx.lineWidth = S * 0.015;
  ctx.stroke();

  // Arc: center (S*0.5, S*0.5), R = S*0.28
  const cx = S * 0.5, cy = S * 0.5, R = S * 0.28;
  function polar(deg) {
    const rad = (deg - 90) * Math.PI / 180;
    return { x: cx + R * Math.cos(rad), y: cy + R * Math.sin(rad) };
  }
  const startPt = polar(-120);
  const endPt   = polar(120);
  const tipPt   = polar(48);
  const sA = Math.atan2(startPt.y - cy, startPt.x - cx);
  const eA = Math.atan2(endPt.y - cy, endPt.x - cx);
  const tA = Math.atan2(tipPt.y - cy, tipPt.x - cx);
  const lw = S * 0.11;

  // Track
  ctx.save();
  ctx.strokeStyle = '#1e1e22';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, R, sA, eA, false);
  ctx.stroke();
  ctx.restore();

  // Progress glow
  const grad = ctx.createLinearGradient(startPt.x, startPt.y, tipPt.x, tipPt.y);
  grad.addColorStop(0, '#f59e0b');
  grad.addColorStop(1, '#f97316');
  ctx.save();
  ctx.strokeStyle = grad;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.shadowColor = '#f97316';
  ctx.shadowBlur = S * 0.04;
  ctx.beginPath();
  ctx.arc(cx, cy, R, sA, tA, false);
  ctx.stroke();
  ctx.restore();

  // Progress crisp
  ctx.save();
  ctx.strokeStyle = grad;
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(cx, cy, R, sA, tA, false);
  ctx.stroke();
  ctx.restore();

  // Needle halo
  const h = ctx.createRadialGradient(tipPt.x, tipPt.y, 0, tipPt.x, tipPt.y, S * 0.09);
  h.addColorStop(0, 'rgba(249,115,22,0.35)');
  h.addColorStop(1, 'rgba(249,115,22,0)');
  ctx.fillStyle = h;
  ctx.beginPath();
  ctx.arc(tipPt.x, tipPt.y, S * 0.09, 0, Math.PI * 2);
  ctx.fill();

  // Needle dot
  ctx.save();
  ctx.fillStyle = '#f97316';
  ctx.shadowColor = '#f97316';
  ctx.shadowBlur = S * 0.025;
  ctx.beginPath();
  ctx.arc(tipPt.x, tipPt.y, S * 0.045, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // White center
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(tipPt.x, tipPt.y, S * 0.019, 0, Math.PI * 2);
  ctx.fill();
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

window.__icon192 = c192.toDataURL('image/png');
window.__icon512 = c512.toDataURL('image/png');

// Auto-download both
[{data: window.__icon192, name: 'icon-192.png'}, {data: window.__icon512, name: 'icon-512.png'}].forEach(({data, name}) => {
  const a = document.createElement('a');
  a.href = data; a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
});
console.log('Icons ready');
</script>
</body>
</html>

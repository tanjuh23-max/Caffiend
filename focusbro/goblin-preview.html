<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FocusBro — Goblin Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07070a;
    color: #f5f5f5;
    font-family: Inter, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    gap: 28px;
  }

  h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  h1 span { color: #fbbf24; }
  .subtitle { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }

  /* ── State buttons ── */
  .states {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
  }
  .states button {
    padding: 6px 14px;
    border-radius: 99px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .states button:hover  { border-color: rgba(255,255,255,0.3); color: white; }
  .states button.active {
    background: rgba(251,191,36,0.15);
    border-color: rgba(251,191,36,0.5);
    color: #fbbf24;
  }

  /* ── Mascot stage ── */
  .stage {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .glow-ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -56%);
    pointer-events: none;
    animation: ring-pulse 1.4s ease-out infinite;
  }
  .goblin-svg {
    position: relative;
    z-index: 1;
  }
  .caption {
    padding: 10px 20px;
    border-radius: 18px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    max-width: 280px;
    backdrop-filter: blur(12px);
    animation: caption-swap 4.5s ease-in-out infinite;
    line-height: 1.4;
  }
  .state-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.25);
  }

  /* ── Animations ── */
  @keyframes ring-pulse {
    0%   { transform: translate(-50%,-56%) scale(1);   opacity: 0.6; }
    100% { transform: translate(-50%,-56%) scale(1.55); opacity: 0; }
  }
  @keyframes caption-swap {
    0%   { opacity:0; transform:translateY(6px); }
    12%  { opacity:1; transform:translateY(0); }
    88%  { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-6px); }
  }
  @keyframes mascot-float {
    0%,100% { transform:translateY(0px); }
    50%     { transform:translateY(-12px); }
  }
  @keyframes mascot-pulse {
    0%,100% { transform:scale(1); }
    50%     { transform:scale(1.06); }
  }
  @keyframes mascot-pulse-slow {
    0%,100% { transform:scale(1); }
    50%     { transform:scale(1.025); }
  }
  @keyframes mascot-work {
    0%,100% { transform:translateY(0) scale(1); }
    35%     { transform:translateY(-5px) scale(1.03); }
    65%     { transform:translateY(-2px) scale(1.01); }
  }
  @keyframes mascot-shake {
    0%,100% { transform:translateX(0) rotate(0deg); }
    20%     { transform:translateX(-4px) rotate(-2deg); }
    40%     { transform:translateX(4px) rotate(2deg); }
    60%     { transform:translateX(-3px) rotate(-1deg); }
    80%     { transform:translateX(3px) rotate(1deg); }
  }
  @keyframes mascot-celebrate {
    0%,100% { transform:scale(1) rotate(0deg); }
    25%     { transform:scale(1.1) rotate(-4deg); }
    50%     { transform:scale(1.12) rotate(4deg); }
    75%     { transform:scale(1.08) rotate(-2deg); }
  }
  @keyframes zzz-drift {
    0%   { transform:translate(0,0) scale(0.7); opacity:0.9; }
    100% { transform:translate(10px,-40px) scale(1.1); opacity:0; }
  }
  @keyframes spark-pop {
    0%   { transform:scale(0); opacity:0; }
    40%  { opacity:1; }
    100% { transform:scale(1.5) translateY(-20px); opacity:0; }
  }

  .anim-float      { animation: mascot-float 3.2s ease-in-out infinite; }
  .anim-pulse      { animation: mascot-pulse 2s ease-in-out infinite; }
  .anim-pulse-slow { animation: mascot-pulse-slow 4.5s ease-in-out infinite; }
  .anim-work       { animation: mascot-work 1.9s ease-in-out infinite; }
  .anim-shake      { animation: mascot-shake 0.55s ease-in-out infinite; }
  .anim-celebrate  { animation: mascot-celebrate 0.8s ease-in-out infinite; }
</style>
</head>
<body>

<div>
  <h1>Focus<span>Bro</span></h1>
  <p class="subtitle">goblin mascot preview — click a state to switch</p>
</div>

<div class="states" id="stateBtns"></div>

<div class="stage">
  <div class="glow-ring" id="glowRing" style="width:220px;height:220px;"></div>
  <svg id="goblinSvg" viewBox="0 0 200 220" width="210" height="210"
    class="goblin-svg" aria-label="Goblin mascot"></svg>
  <div class="caption" id="caption"></div>
  <div class="state-label" id="stateLabel"></div>
</div>

<script>
/* ── State definitions ──────────────────────────────────────────────────── */
const STATES = {

    captions: [

    captions: [
      'GOBLIN KING STATUS 👑',

    ],
  },
  overdue: {
    glow: 'rgba(251,146,60,0.6)',
    color: '#f97316',
    anim: 'anim-shake',
    brows: 'panicked', eyes: 'spiral', mouth: 'openScream', extra: 'papers',

      'bro you NEED a break 😵‍💫',

    anim: 'anim-float',
    brows: 'relaxed', eyes: 'content', mouth: 'smile', extra: 'crownTilt',
    captions: [

    color: '#fbbf24',
    anim: 'anim-celebrate',
    brows: 'raised', eyes: 'stars', mouth: 'bigGrin', extra: 'sparkles',
    captions: [
      'SESSION COMPLETE 🏆',
      "THAT'S GOBLIN MODE FR",
      'no cap you absolutely cooked it',
    ],
  },
};

/* ── SVG builder (v2 — gradient shading) ────────────────────────────────── */
function defs() {
  return `<defs>
    <radialGradient id="g-skin" cx="38%" cy="28%" r="68%">
      <stop offset="0%"   stop-color="#a8e070"/>
      <stop offset="42%"  stop-color="#5dba48"/>
      <stop offset="78%"  stop-color="#3a8c28"/>
      <stop offset="100%" stop-color="#1f5c12"/>
    </radialGradient>
    <radialGradient id="g-skin-dark" cx="30%" cy="25%" r="75%">
      <stop offset="0%"   stop-color="#6dc850"/>
      <stop offset="100%" stop-color="#1a5010"/>
    </radialGradient>
    <radialGradient id="g-iris" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#fde68a"/>
      <stop offset="45%"  stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#78350f"/>
    </radialGradient>
    <linearGradient id="g-cloth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c4522"/>
      <stop offset="100%" stop-color="#2e1508"/>
    </linearGradient>
    <linearGradient id="g-teeth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fffff0"/>
      <stop offset="100%" stop-color="#d4d4a0"/>
    </linearGradient>
    <radialGradient id="g-head-hi" cx="38%" cy="28%" r="45%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="g-sclera" cx="35%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dde8d0"/>
    </radialGradient>
    <filter id="f-shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.45)"/>
    </filter>
    <filter id="f-blush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="cp-eL"><ellipse cx="72"  cy="86" rx="19" ry="17"/></clipPath>
    <clipPath id="cp-eR"><ellipse cx="128" cy="86" rx="19" ry="17"/></clipPath>
  </defs>`;
}

function body() {
  const HAIR = '#1e0e04', HI = 'rgba(120,60,20,0.5)';
  return `
    <!-- ears -->
    <path d="M42 60 Q34 52 22 38 Q14 26 18 16 Q26 10 36 22 Q44 34 44 52 Z" fill="url(#g-skin-dark)"/>
    <path d="M40 58 Q34 50 24 38 Q18 28 22 20 Q28 16 34 26 Q40 38 42 54 Z" fill="url(#g-skin)" opacity="0.7"/>
    <path d="M32 24 Q36 34 38 50" stroke="#1a5010" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <path d="M158 60 Q166 52 178 38 Q186 26 182 16 Q174 10 164 22 Q156 34 156 52 Z" fill="url(#g-skin-dark)"/>
    <path d="M160 58 Q166 50 176 38 Q182 28 178 20 Q172 16 166 26 Q160 38 158 54 Z" fill="url(#g-skin)" opacity="0.7"/>
    <path d="M168 24 Q164 34 162 50" stroke="#1a5010" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    <!-- body -->
    <path d="M22 158 Q50 148 100 146 Q150 148 178 158 L184 220 L16 220 Z" fill="url(#g-cloth)"/>
    <path d="M64 150 L70 140 L76 150 L82 138 L88 149 L94 142 L100 150 L106 142 L112 149 L118 138 L124 150 L130 140 L136 150"
      stroke="#5a3010" stroke-width="2.5" fill="#5a3010" stroke-linejoin="round"/>
    <path d="M55 175 Q80 170 100 172 Q120 170 145 175" stroke="rgba(0,0,0,0.15)" stroke-width="1.5" fill="none"/>
    <!-- head -->
    <path d="M100 16 C146 16 172 40 172 76 C172 110 152 132 126 140 C116 146 100 150 100 150 C100 150 84 146 74 140 C48 132 28 110 28 76 C28 40 54 16 100 16 Z"
      fill="url(#g-skin)" filter="url(#f-shadow)"/>
    <ellipse cx="78" cy="44" rx="24" ry="18" fill="url(#g-head-hi)" opacity="0.9"/>
    <ellipse cx="100" cy="144" rx="30" ry="8" fill="rgba(0,0,0,0.12)" opacity="0.6"/>
    <!-- hair -->
    <path d="M66 18 Q60 4  52 10 Q58 16 62 24"    fill="${HAIR}"/>
    <path d="M80 14 Q76 1  68 6  Q72 14 76 20"    fill="${HAIR}"/>
    <path d="M100 12 Q98 -1 92 4  Q95 12 98 18"   fill="${HAIR}"/>
    <path d="M118 14 Q122 1 130 6 Q126 14 122 20"  fill="${HAIR}"/>
    <path d="M133 18 Q140 4 148 10 Q142 16 137 24" fill="${HAIR}"/>
    <path d="M63 12 Q60 7 56 11"  stroke="${HI}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M78 8  Q76 4 72 7"   stroke="${HI}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M99 6  Q98 2 95 5"   stroke="${HI}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M121 8  Q123 4 127 7" stroke="${HI}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M136 12 Q140 7 144 10" stroke="${HI}" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- cheeks -->
    <ellipse cx="52"  cy="102" rx="16" ry="11" fill="rgba(255,130,130,0.32)" filter="url(#f-blush)"/>
    <ellipse cx="148" cy="102" rx="16" ry="11" fill="rgba(255,130,130,0.32)" filter="url(#f-blush)"/>
    <!-- nose -->
    <ellipse cx="100" cy="112" rx="10" ry="9" fill="#2e7a1a" opacity="0.85"/>
    <ellipse cx="97"  cy="110" rx="6"  ry="5" fill="#3d9a22" opacity="0.6"/>
    <ellipse cx="95.5" cy="116" rx="3" ry="2.5" fill="#144010" opacity="0.9"/>
    <ellipse cx="104.5" cy="116" rx="3" ry="2.5" fill="#144010" opacity="0.9"/>
    <circle cx="94"  cy="115" r="1" fill="rgba(255,255,255,0.2)"/>
    <circle cx="103" cy="115" r="1" fill="rgba(255,255,255,0.2)"/>
  `;
}

function brows(type) {
  const b = (d,w=4) => `<path d="${d}" fill="#1e0e04" stroke="#1e0e04" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
  switch(type) {
    case 'droopy':    return b("M56 68 Q68 73 80 71")+b("M120 71 Q132 73 144 68");
    case 'determined':return b("M54 64 Q68 70 80 67",4.5)+b("M120 67 Q132 70 146 64",4.5);
    case 'relaxed':   return b("M56 65 Q68 60 80 63")+b("M120 63 Q132 60 144 65");
    case 'smug':      return b("M56 62 Q68 56 80 60")+b("M120 63 Q132 61 144 64");
    case 'raised':    return b("M56 60 Q68 53 80 57")+b("M120 57 Q132 53 144 60");
    case 'panicked':  return b("M54 62 Q68 70 80 64",4.5)+b("M120 64 Q132 70 146 62",4.5);
    default: return '';
  }
}

function eyeUnit(cx, clipId, type) {
  const rx=19,ry=17;
  if(type==='content') return `<path d="M${cx-rx} 86 Q${cx} ${86-ry-4} ${cx+rx} 86" stroke="#1a0a00" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;
  if(type==='stars') return `<ellipse cx="${cx}" cy="86" rx="${rx}" ry="${ry}" fill="url(#g-sclera)"/><text x="${cx-14}" y="92" font-size="18">⭐</text>`;
  if(type==='spiral') return `
    <ellipse cx="${cx}" cy="86" rx="${rx}" ry="${ry}" fill="url(#g-sclera)"/>
    <line x1="${cx-12}" y1="74" x2="${cx+12}" y2="98" stroke="#1a0a00" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="${cx+12}" y1="74" x2="${cx-12}" y2="98" stroke="#1a0a00" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="86" r="4" fill="#cc2222"/>`;
  const pr=type==='manic'?10:type==='smug'?7:8, ir=type==='manic'?14:type==='smug'?10:12, ox=type==='smug'?2:1;
  const lidH=type==='sleepy'?ry*2*0.65:type==='smug'?ry*2*0.40:0;
  return `
    <ellipse cx="${cx}" cy="86" rx="${rx}" ry="${ry}" fill="url(#g-sclera)" stroke="rgba(0,0,0,0.12)" stroke-width="0.8"/>
    <ellipse cx="${cx+ox}" cy="86" rx="${ir}" ry="${ir*0.92}" fill="url(#g-iris)" clip-path="url(#${clipId})"/>
    <ellipse cx="${cx+ox}" cy="87" rx="${pr*0.62}" ry="${pr*0.72}" fill="#0a0600" clip-path="url(#${clipId})"/>
    <ellipse cx="${cx+ox+4}" cy="80" rx="5" ry="3.5" fill="white" opacity="0.95" clip-path="url(#${clipId})"/>
    <circle cx="${cx+ox-3}" cy="91" r="1.8" fill="white" opacity="0.55" clip-path="url(#${clipId})"/>
    ${lidH>0?`<rect x="${cx-rx-1}" y="${86-ry-1}" width="${rx*2+2}" height="${lidH+1}" rx="8" fill="url(#g-skin)"/>`:''}
    <ellipse cx="${cx}" cy="86" rx="${rx}" ry="${ry}" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1.2"/>`;
}

function eyes(type) {
  return eyeUnit(72,'cp-eL',type)+eyeUnit(128,'cp-eR',type);
}

function mouth(type) {
  const lip='rgba(20,80,10,0.75)';
  switch(type){
    case 'flat':  return `<path d="M82 128 Q100 130 118 128" stroke="${lip}" stroke-width="2.5" fill="none" stroke-linecap="round"/>`;
    case 'smile': return `<path d="M78 126 Q100 140 122 126" fill="rgba(10,50,5,0.6)" stroke="${lip}" stroke-width="1.5"/><path d="M84 136 Q100 140 116 136" stroke="rgba(120,200,80,0.35)" stroke-width="2" fill="none" stroke-linecap="round"/>`;
    case 'smirk': return `<path d="M82 126 Q96 134 114 126" fill="rgba(10,50,5,0.55)" stroke="${lip}" stroke-width="1.5"/>`;
    case 'grin':  return `<path d="M68 124 Q100 148 132 124" fill="#0a2808"/>
      ${[68,80,92,104,116].map(x=>`<rect x="${x+2}" y="124" width="10" height="10" rx="2" fill="url(#g-teeth)"/>`).join('')}
      <path d="M68 124 Q100 148 132 124" fill="none" stroke="${lip}" stroke-width="1.8"/>`;
    case 'bigGrin': return `<path d="M62 122 Q100 152 138 122" fill="#0a2808"/>
      ${[62,74,87,100,113,126].map(x=>`<rect x="${x+2}" y="122" width="11" height="12" rx="2.5" fill="url(#g-teeth)"/>`).join('')}
      <path d="M62 122 Q100 152 138 122" fill="none" stroke="${lip}" stroke-width="2"/>`;
    case 'openScream': return `<ellipse cx="100" cy="134" rx="20" ry="14" fill="#0a2808"/><ellipse cx="100" cy="130" rx="20" ry="8" fill="#cc4444" opacity="0.8"/><ellipse cx="100" cy="140" rx="10" ry="6" fill="#e05050" opacity="0.9"/>`;
    default: return '';
  }
}

function extra(type, color) {
  switch(type){
    case 'phone': return `
      <rect x="126" y="128" width="18" height="28" rx="4" fill="#111827" stroke="#374151" stroke-width="1.2"/>
      <rect x="128" y="131" width="14" height="18" rx="2" fill="#2563eb" opacity="0.75"/>
      <text style="animation:zzz-drift 2.4s ease-out infinite 0s"   x="150" y="110" font-size="13" font-weight="bold" fill="#93c5fd" opacity="0.8">z</text>
      <text style="animation:zzz-drift 2.4s ease-out infinite 0.9s" x="158" y="92"  font-size="16" font-weight="bold" fill="#93c5fd" opacity="0.55">z</text>
      <text style="animation:zzz-drift 2.4s ease-out infinite 1.7s" x="164" y="72"  font-size="20" font-weight="bold" fill="#93c5fd" opacity="0.3">Z</text>`;
    case 'laptop': return `
      <ellipse cx="100" cy="196" rx="46" ry="12" fill="rgba(96,165,250,0.22)"/>
      <path d="M14 40 L8 56 L16 56 L8 74 L24 52 L16 52 Z" fill="${color}" opacity="0.8" style="animation:spark-pop 2s ease-out infinite 0.3s"/>
      <path d="M178 34 L173 48 L180 48 L174 62 L188 44 L181 44 Z" fill="${color}" opacity="0.7" style="animation:spark-pop 2s ease-out infinite 1.2s"/>`;
    case 'flower': return `<text x="132" y="134" font-size="26" style="animation:spark-pop 3s ease-out infinite 0.5s">🌸</text>`;
    case 'crown': return `
      <path d="M58 24 L68 8 L100 18 L132 8 L142 24 L136 30 L64 30 Z" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
      <circle cx="100" cy="10" r="5.5" fill="#ef4444"/>
      <circle cx="68"  cy="12" r="4"   fill="#34d399"/>
      <circle cx="132" cy="12" r="4"   fill="#60a5fa"/>
      <path d="M65 26 Q100 22 135 26" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>`;
    case 'crownTilt': return `
      <g transform="rotate(14,100,18)">
        <path d="M58 24 L68 8 L100 18 L132 8 L142 24 L136 30 L64 30 Z" fill="#a78bfa" stroke="#7c3aed" stroke-width="2"/>
        <circle cx="100" cy="10" r="5" fill="#f9a8d4"/>
      </g>`;
    case 'papers': return `
      ${[[10,30,-22],[16,54,15],[170,24,18],[166,52,-12]].map(([x,y,r])=>`<rect x="${x}" y="${y}" width="20" height="26" rx="2" fill="white" stroke="#e5e7eb" stroke-width="1" transform="rotate(${r},${x+10},${y+13})" style="animation:spark-pop 1.5s ease-out infinite 0s"/>`).join('')}`;
    case 'sparkles': return `
      <text x="8"   y="32" font-size="16" style="animation:spark-pop 2.2s ease-out infinite 0s">✨</text>
      <text x="170" y="24" font-size="14" style="animation:spark-pop 2.2s ease-out infinite 0.7s">✨</text>
      <text x="168" y="60" font-size="11" style="animation:spark-pop 2.2s ease-out infinite 1.2s">⭐</text>
      <text x="10"  y="62" font-size="11" style="animation:spark-pop 2.2s ease-out infinite 1.8s">⭐</text>`;
    default: return '';
  }
}

/* ── Render ──────────────────────────────────────────────────────────────── */
let captionInterval = null;
let captionIdx = 0;

function render(stateKey) {
  const cfg = STATES[stateKey];

  // Glow ring
  const ring = document.getElementById('glowRing');
  ring.style.background = `radial-gradient(circle, ${cfg.glow} 0%, transparent 68%)`;

  // SVG
  const svg = document.getElementById('goblinSvg');
  svg.className.baseVal = 'goblin-svg ' + cfg.anim;
  svg.style.filter = `drop-shadow(0 0 22px ${cfg.glow}) drop-shadow(0 0 8px ${cfg.glow})`;
  svg.innerHTML = defs() + extra(cfg.extra, cfg.color) + body() + brows(cfg.brows) + eyes(cfg.eyes) + mouth(cfg.mouth);

  // Caption cycling
  clearInterval(captionInterval);
  captionIdx = 0;
  const cap = document.getElementById('caption');
  cap.style.background = 'rgba(255,255,255,0.05)';
  cap.style.border = `1px solid ${cfg.glow}`;
  cap.style.color = cfg.color;
  function showCaption() {
    cap.style.animation = 'none';
    cap.offsetHeight; // reflow
    cap.style.animation = 'caption-swap 4.5s ease-in-out infinite';
    cap.textContent = cfg.captions[captionIdx % cfg.captions.length];
    captionIdx++;
  }
  showCaption();
  captionInterval = setInterval(showCaption, 4500);

  // Label
  document.getElementById('stateLabel').textContent = stateKey.toUpperCase();

  // Buttons
  document.querySelectorAll('.states button').forEach(b => {
    b.classList.toggle('active', b.dataset.state === stateKey);
  });
}

/* ── Build buttons ───────────────────────────────────────────────────────── */
const labels = {
  idle: '😴 Idle', working: '🧌 Working', break: '🌊 Break',
  good: '🔥 Good', great: '👑 Great', overdue: '😵‍💫 Overdue',
  done: '✅ Done', celebrate: '🏆 Celebrate',
};
const container = document.getElementById('stateBtns');
Object.keys(STATES).forEach(key => {
  const btn = document.createElement('button');
  btn.textContent = labels[key] || key;
  btn.dataset.state = key;
  btn.onclick = () => render(key);
  container.appendChild(btn);
});

// Start on idle
render('idle');
</script>
</body>
</html>
